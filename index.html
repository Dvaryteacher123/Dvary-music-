<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dvary Music Hub</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 40px 20px; }
        .container { width: 100%; max-width: 800px; background: #181818; padding: 50px; border-radius: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); text-align: center; }
        h1 { font-size: 40px; margin-bottom: 30px; color: #1DB954; }
        input { width: 70%; padding: 20px; font-size: 18px; border-radius: 50px; border: none; outline: none; margin-bottom: 20px; }
        button.search-btn { padding: 20px 40px; font-size: 18px; border-radius: 50px; cursor: pointer; background: #1DB954; color: white; font-weight: bold; border: none; }
        .song-card { background: #282828; margin: 20px 0; padding: 25px; border-radius: 20px; display: flex; align-items: center; justify-content: space-between; text-align: left; transition: 0.3s; }
        .song-card:hover { background: #333; }
        .song-info { display: flex; align-items: center; gap: 20px; }
        img { width: 80px; height: 80px; border-radius: 10px; }
        .save-btn { background: #1DB954; color: white; padding: 12px 25px; border-radius: 10px; cursor: pointer; border: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>Dvary Music Hub</h1>
    <input type="text" id="search" placeholder="Tafuta msanii au wimbo...">
    <button class="search-btn" onclick="searchMusic()">Tafuta Sasa</button>
    
    <div id="results" style="margin-top: 40px;"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAHNhUyFC7PlZGijkmYUnEc1GlEYJGHI40",
        authDomain: "manyama2006-50664.firebaseapp.com",
        projectId: "manyama2006-50664",
        storageBucket: "manyama2006-50664.firebasestorage.app",
        messagingSenderId: "749612577601",
        appId: "1:749612577601:web:53295431132ddff30027c0",
        measurementId: "G-9E858GX9HB"
    };

    const db = getFirestore(initializeApp(firebaseConfig));

    window.searchMusic = async () => {
        const query = document.getElementById('search').value;
        const list = document.getElementById('results');
        
        if (!query) return alert("Tafadhali andika jina la msanii!");
        
        list.innerHTML = "Tafadhali subiri...";

        try {
            // Tunatumia CORS proxy ili kuepuka error za browser
            const res = await fetch(`https://corsproxy.io/?https://api.deezer.com/search?q=${encodeURIComponent(query)}`);
            const data = await res.json();
            
            list.innerHTML = "";
            
            if (data.data && data.data.length > 0) {
                data.data.forEach(song => {
                    const div = document.createElement('div');
                    div.className = "song-card";
                    div.innerHTML = `
                        <div class="song-info">
                            <img src="${song.album.cover_medium}" alt="Album Art">
                            <div>
                                <div style="font-size: 20px; font-weight: bold;">${song.title}</div>
                                <div style="color: #bbb;">${song.artist.name}</div>
                            </div>
                        </div>
                        <button class="save-btn" onclick="saveSong('${song.title.replace(/'/g, "")}', '${song.artist.name}')">Hifadhi</button>
                    `;
                    list.appendChild(div);
                });
            } else {
                list.innerHTML = "Hatujapata nyimbo yoyote kwa jina hilo.";
            }
        } catch (error) {
            console.error(error);
            list.innerHTML = "Kuna tatizo la mtandao. Jaribu tena.";
        }
    };

    window.saveSong = async (title, artist) => {
        try {
            await addDoc(collection(db, "favorites"), { 
                title: title, 
                artist: artist, 
                savedAt: new Date() 
            });
            alert(title + " Imehifadhiwa kwenye Database!");
        } catch (e) {
            alert("Error: " + e.message);
        }
    };
</script>
</body>
</html>
