<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dvary Media Hub</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: #ffffff; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 600px; background: #181818; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; }
        
        .channel-box { background: linear-gradient(135deg, #25D366, #128C7E); padding: 15px; border-radius: 12px; margin-bottom: 25px; }
        .channel-box a { color: #fff; font-weight: bold; text-decoration: none; display: block; margin-top: 5px; font-size: 1.1em; }

        input { width: 80%; padding: 15px; border-radius: 25px; border: none; outline: none; margin-bottom: 15px; font-size: 16px; }
        button.search-btn { padding: 15px 30px; border-radius: 25px; background: #1DB954; color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button.search-btn:hover { background: #17a448; }

        .media-card { background: #282828; margin: 15px 0; padding: 15px; border-radius: 12px; text-align: left; }
        .actions { margin-top: 10px; display: flex; gap: 10px; }
        .btn-dl { background: #ff0000; padding: 8px 15px; text-decoration: none; border-radius: 6px; color: white; font-size: 13px; font-weight: bold; }
        .btn-dl:hover { background: #cc0000; }
    </style>
</head>
<body>

<div class="container">
    <div class="channel-box">
        <p style="margin:0;">Jiunge na Channel yangu ya WhatsApp kwa update za kila siku!</p>
        <a href="https://whatsapp.com/channel/0029VbCRC9b5fM5cruU8PF2M" target="_blank">👉 Jiunge Hapa</a>
    </div>

    <h1>Dvary Media Hub</h1>
    <input type="text" id="search" placeholder="Tafuta video au wimbo...">
    <button class="search-btn" onclick="searchMedia()">Tafuta Sasa</button>
    
    <div id="results" style="margin-top: 25px;"></div>
</div>

<script>
    async function searchMedia() {
        const query = document.getElementById('search').value;
        const list = document.getElementById('results');
        
        if(!query) return alert("Tafadhali andika jina la msanii au wimbo!");
        
        list.innerHTML = "Inatafuta...";

        try {
            // Tunatumia Invidious API (YouTube proxy)
            const res = await fetch(`https://invidious.jing.rocks/api/v1/search?q=${encodeURIComponent(query)}&type=video`);
            const data = await res.json();

            list.innerHTML = "";
            if (data.length === 0) {
                list.innerHTML = "Hatujapata matokeo.";
                return;
            }

            data.forEach(item => {
                const div = document.createElement('div');
                div.className = "media-card";
                div.innerHTML = `
                    <div style="font-weight:bold; margin-bottom:10px;">${item.title}</div>
                    <div class="actions">
                        <a href="https://www.y2mate.com/youtube/${item.videoId}" target="_blank" class="btn-dl">Pakua (MP3/MP4)</a>
                    </div>
                `;
                list.appendChild(div);
            });
        } catch (error) {
            list.innerHTML = "Samahani, kuna tatizo la mtandao. Jaribu tena.";
        }
    }
</script>
</body>
</html>
