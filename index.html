<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dvary Music Hub</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; }
        .container { width: 100%; max-width: 600px; background: #181818; padding: 30px; border-radius: 20px; text-align: center; }
        input { width: 80%; padding: 15px; border-radius: 25px; border: none; margin-bottom: 15px; outline: none; }
        button { padding: 15px 30px; border-radius: 25px; border: none; background: #1DB954; color: white; font-weight: bold; cursor: pointer; }
        .song-card { background: #282828; margin: 15px 0; padding: 15px; border-radius: 10px; display: flex; align-items: center; justify-content: space-between; text-align: left; }
        img { width: 60px; border-radius: 5px; margin-right: 15px; }
        .save-btn { background: #444; color: white; padding: 8px 15px; border-radius: 5px; cursor: pointer; border: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>Dvary Music Hub</h1>
    <input type="text" id="search" placeholder="Tafuta msanii...">
    <button onclick="searchMusic()">Tafuta Sasa</button>
    <div id="results" style="margin-top: 20px;"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAHNhUyFC7PlZGijkmYUnEc1GlEYJGHI40",
        authDomain: "manyama2006-50664.firebaseapp.com",
        projectId: "manyama2006-50664",
        storageBucket: "manyama2006-50664.firebasestorage.app",
        messagingSenderId: "749612577601",
        appId: "1:749612577601:web:53295431132ddff30027c0",
        measurementId: "G-9E858GX9HB"
    };

    const db = getFirestore(initializeApp(firebaseConfig));

    window.searchMusic = async () => {
        const query = document.getElementById('search').value;
        const list = document.getElementById('results');
        list.innerHTML = "Inatafuta...";

        try {
            // Njia ya uhakika ya Proxy
            const url = `https://api.deezer.com/search?q=${encodeURIComponent(query)}`;
            const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`);
            const dataWrapper = await res.json();
            const data = JSON.parse(dataWrapper.contents);

            list.innerHTML = "";
            if (data.data && data.data.length > 0) {
                data.data.forEach(song => {
                    const div = document.createElement('div');
                    div.className = "song-card";
                    div.innerHTML = `
                        <div style="display:flex; align-items:center;">
                            <img src="${song.album.cover_small}">
                            <div><strong>${song.title}</strong><br><small>${song.artist.name}</small></div>
                        </div>
                        <button class="save-btn" onclick="saveSong('${song.title.replace(/'/g, "")}', '${song.artist.name}')">Hifadhi</button>
                    `;
                    list.appendChild(div);
                });
            } else {
                list.innerHTML = "Hatujapata matokeo.";
            }
        } catch (error) {
            list.innerHTML = "Samahani, jaribu tena.";
        }
    };

    window.saveSong = async (title, artist) => {
        await addDoc(collection(db, "favorites"), { title, artist, savedAt: new Date() });
        alert(title + " Imehifadhiwa!");
    };
</script>
</body>
</html>
