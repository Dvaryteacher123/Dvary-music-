<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dvary Media Hub</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; }
        .container { width: 100%; max-width: 650px; background: #181818; padding: 30px; border-radius: 20px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .channel-box { background: linear-gradient(135deg, #25D366, #128C7E); padding: 15px; border-radius: 12px; margin-bottom: 25px; }
        .channel-box a { color: #fff; font-weight: bold; text-decoration: none; display: block; margin-top: 5px; }
        
        input { width: 80%; padding: 15px; border-radius: 25px; border: none; margin-bottom: 15px; outline: none; }
        button.search-btn { padding: 15px 30px; border-radius: 25px; border: none; background: #1DB954; color: white; font-weight: bold; cursor: pointer; }
        
        .song-card { background: #282828; margin: 15px 0; padding: 15px; border-radius: 12px; text-align: left; }
        .controls { display: flex; gap: 10px; align-items: center; margin-top: 10px; }
        select { padding: 8px; border-radius: 5px; border: none; }
        .dl-btn { background: #ff0000; color: white; padding: 8px 15px; border-radius: 5px; text-decoration: none; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="channel-box">
        <p style="margin:0;">Jiunge na Channel yangu ya WhatsApp!</p>
        <a href="https://whatsapp.com/channel/0029VbCRC9b5fM5cruU8PF2M" target="_blank">👉 Jiunge Hapa</a>
    </div>

    <h1>Dvary Media Hub</h1>
    <input type="text" id="search" placeholder="Tafuta wimbo au msanii...">
    <button class="search-btn" onclick="searchMedia()">Tafuta Sasa</button>
    <div id="results" style="margin-top: 25px;"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAHNhUyFC7PlZGijkmYUnEc1GlEYJGHI40",
        authDomain: "manyama2006-50664.firebaseapp.com",
        projectId: "manyama2006-50664",
        storageBucket: "manyama2006-50664.firebasestorage.app",
        messagingSenderId: "749612577601",
        appId: "1:749612577601:web:53295431132ddff30027c0",
        measurementId: "G-9E858GX9HB"
    };

    const db = getFirestore(initializeApp(firebaseConfig));

    window.searchMedia = async () => {
        const query = document.getElementById('search').value;
        const list = document.getElementById('results');
        if(!query) return alert("Andika jina la msanii!");
        list.innerHTML = "Inatafuta...";

        try {
            const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(query)}&media=music&limit=10`);
            const data = await res.json();

            list.innerHTML = "";
            data.results.forEach(song => {
                const div = document.createElement('div');
                div.className = "song-card";
                div.innerHTML = `
                    <div style="display:flex; align-items:center;">
                        <img src="${song.artworkUrl60}" style="border-radius:8px; margin-right:15px;">
                        <div><strong>${song.trackName}</strong><br><small>${song.artistName}</small></div>
                    </div>
                    <div class="controls">
                        <select id="format-${song.trackId}">
                            <option value="mp3">MP3 (Audio)</option>
                            <option value="mp4">MP4 (Video)</option>
                        </select>
                        <button class="dl-btn" onclick="downloadFile('${song.trackName.replace(/'/g, "")}', '${song.artistName}', 'format-${song.trackId}')">Pakua</button>
                    </div>
                `;
                list.appendChild(div);
            });
        } catch (e) { list.innerHTML = "Mtandao umegoma."; }
    };

    window.downloadFile = (title, artist, selectId) => {
        const format = document.getElementById(selectId).value;
        const query = encodeURIComponent(title + ' ' + artist);
        // Link ya moja kwa moja ya kuchagua format kwenye Y2mate
        window.open(`https://www.y2mate.com/search/${query}`, '_blank');
        alert("Chagua " + format.toUpperCase() + " kwenye ukurasa utakaofunguka ili kukamilisha!");
    };
</script>
</body>
</html>
