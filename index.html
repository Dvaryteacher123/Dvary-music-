<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dvary Music Hub</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; }
        .container { width: 100%; max-width: 650px; background: #181818; padding: 30px; border-radius: 20px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        input { width: 80%; padding: 15px; border-radius: 25px; border: none; margin-bottom: 15px; outline: none; font-size: 16px; }
        button.search-btn { padding: 15px 30px; border-radius: 25px; border: none; background: #1DB954; color: white; font-weight: bold; cursor: pointer; }
        .song-card { background: #282828; margin: 15px 0; padding: 15px; border-radius: 12px; display: flex; align-items: center; justify-content: space-between; text-align: left; }
        img { width: 60px; height: 60px; border-radius: 8px; margin-right: 15px; }
        .btn-group { display: flex; gap: 8px; }
        .action-btn { padding: 8px 12px; border-radius: 6px; border: none; cursor: pointer; font-size: 12px; font-weight: bold; text-decoration: none; color: white; }
        .download-btn { background: #007bff; }
        .save-btn { background: #444; }
    </style>
</head>
<body>

<div class="container">
    <h1>Dvary Music Hub</h1>
    <input type="text" id="search" placeholder="Tafuta wimbo au msanii...">
    <button class="search-btn" onclick="searchMusic()">Tafuta Sasa</button>
    <div id="results" style="margin-top: 25px;"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAHNhUyFC7PlZGijkmYUnEc1GlEYJGHI40",
        authDomain: "manyama2006-50664.firebaseapp.com",
        projectId: "manyama2006-50664",
        storageBucket: "manyama2006-50664.firebasestorage.app",
        messagingSenderId: "749612577601",
        appId: "1:749612577601:web:53295431132ddff30027c0",
        measurementId: "G-9E858GX9HB"
    };

    const db = getFirestore(initializeApp(firebaseConfig));

    window.searchMusic = async () => {
        const query = document.getElementById('search').value;
        const list = document.getElementById('results');
        if(!query) return alert("Andika jina!");
        
        list.innerHTML = "Inatafuta...";

        try {
            const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(query)}&media=music&limit=10`);
            const data = await res.json();

            list.innerHTML = "";
            if (data.results && data.results.length > 0) {
                data.results.forEach(song => {
                    const div = document.createElement('div');
                    div.className = "song-card";
                    div.innerHTML = `
                        <div style="display:flex; align-items:center;">
                            <img src="${song.artworkUrl60}">
                            <div><strong>${song.trackName}</strong><br><small>${song.artistName}</small></div>
                        </div>
                        <div class="btn-group">
                            <a href="${song.previewUrl}" download="${song.trackName}.mp3" class="action-btn download-btn">Download</a>
                            <button class="action-btn save-btn" onclick="saveSong('${song.trackName.replace(/'/g, "")}', '${song.artistName}')">Save</button>
                        </div>
                    `;
                    list.appendChild(div);
                });
            } else {
                list.innerHTML = "Hatujapata matokeo.";
            }
        } catch (error) {
            list.innerHTML = "Samahani, mtandao umegoma.";
        }
    };

    window.saveSong = async (title, artist) => {
        try {
            await addDoc(collection(db, "favorites"), { title, artist, savedAt: new Date() });
            alert(title + " Imehifadhiwa!");
        } catch (e) {
            alert("Error: " + e.message);
        }
    };
</script>
</body>
</html>
