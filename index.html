<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎵 DVARY MUSIC API</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* ============================================
           ROOT VARIABLES
           ============================================ */
        :root {
            --bg-primary: #0a0a1a;
            --bg-secondary: #111128;
            --bg-card: rgba(255,255,255,0.04);
            --text-primary: #ffffff;
            --text-secondary: #aaaacc;
            --text-muted: #666688;
            --border-color: rgba(255,255,255,0.06);
            --shadow: 0 20px 60px rgba(0,0,0,0.5);
            --gradient-1: #1DB954;
            --gradient-2: #1ed760;
            --gradient-3: #ff6b35;
            --accent: #1DB954;
            --accent-glow: rgba(29,185,84,0.2);
            --glass-bg: rgba(255,255,255,0.03);
            --glass-border: rgba(255,255,255,0.05);
            --nav-bg: rgba(10,10,26,0.95);
            --input-bg: rgba(255,255,255,0.05);
        }
        
        [data-theme="light"] {
            --bg-primary: #f0f2f8;
            --bg-secondary: #ffffff;
            --bg-card: rgba(0,0,0,0.03);
            --text-primary: #1a1a2e;
            --text-secondary: #444466;
            --text-muted: #8888aa;
            --border-color: rgba(0,0,0,0.06);
            --shadow: 0 20px 60px rgba(0,0,0,0.08);
            --glass-bg: rgba(255,255,255,0.8);
            --glass-border: rgba(0,0,0,0.05);
            --nav-bg: rgba(240,242,248,0.95);
            --input-bg: #f0f2f8;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            transition: all 0.3s ease;
            overflow-x: hidden;
        }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-primary); }
        ::-webkit-scrollbar-thumb { background: var(--gradient-1); border-radius: 10px; }
        
        /* ===== NAVBAR ===== */
        .navbar {
            position: sticky; top: 0; z-index: 100;
            background: var(--nav-bg);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-color);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .navbar .brand { display: flex; align-items: center; gap: 10px; }
        .navbar .brand .logo-text { font-size: 22px; font-weight: 900; background: linear-gradient(135deg, var(--gradient-1), var(--gradient-2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 1px; }
        .navbar .brand .logo-text i { margin-right: 8px; }
        .navbar .right-section { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .navbar .right-section .nav-btn { padding: 8px 14px; border: 1px solid var(--border-color); border-radius: 10px; background: var(--input-bg); color: var(--text-secondary); cursor: pointer; font-size: 14px; transition: all 0.3s ease; }
        .navbar .right-section .nav-btn:hover { border-color: var(--gradient-1); color: var(--gradient-1); }
        .navbar .right-section .nav-btn.active { background: var(--gradient-1); color: white; border-color: var(--gradient-1); }
        
        /* ===== CONTAINER ===== */
        .container { max-width: 900px; margin: 0 auto; padding: 20px; position: relative; z-index: 1; }
        
        /* ===== HERO ===== */
        .hero { text-align: center; padding: 30px 20px; }
        .hero .icon { font-size: 60px; display: block; animation: pulseIcon 3s ease-in-out infinite; }
        @keyframes pulseIcon { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .hero h1 { font-size: 36px; font-weight: 900; background: linear-gradient(135deg, var(--gradient-1), var(--gradient-2), var(--gradient-3)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hero p { color: var(--text-secondary); font-size: 14px; letter-spacing: 2px; margin-top: 4px; }
        
        /* ===== SEARCH ===== */
        .search-section {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 25px;
            margin: 20px 0;
        }
        .search-section .search-wrapper { display: flex; gap: 12px; flex-wrap: wrap; }
        .search-section .search-wrapper input { flex: 1; min-width: 200px; padding: 14px 20px; border: 2px solid var(--border-color); border-radius: 14px; background: var(--input-bg); color: var(--text-primary); font-size: 16px; outline: none; transition: all 0.3s ease; }
        .search-section .search-wrapper input:focus { border-color: var(--gradient-1); box-shadow: 0 0 30px var(--accent-glow); }
        .search-section .search-wrapper input::placeholder { color: var(--text-muted); }
        .search-section .search-wrapper .btn-search { padding: 14px 32px; border: none; border-radius: 14px; background: linear-gradient(135deg, var(--gradient-1), var(--gradient-2)); color: white; font-weight: 700; font-size: 16px; cursor: pointer; transition: all 0.3s ease; }
        .search-section .search-wrapper .btn-search:hover { transform: translateY(-2px); box-shadow: 0 8px 30px var(--accent-glow); }
        
        /* ===== RESULTS ===== */
        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        
        .song-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 16px;
            transition: all 0.3s ease;
        }
        .song-card:hover { transform: translateY(-5px); border-color: var(--gradient-1); box-shadow: 0 10px 40px var(--accent-glow); background: var(--bg-card-hover); }
        .song-card .cover { width: 100%; aspect-ratio: 1/1; border-radius: 12px; background: var(--bg-secondary); display: flex; align-items: center; justify-content: center; font-size: 50px; color: var(--text-muted); margin-bottom: 12px; position: relative; overflow: hidden; }
        .song-card .cover img { width: 100%; height: 100%; object-fit: cover; }
        .song-card .info h3 { font-size: 14px; color: var(--text-primary); margin-bottom: 2px; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
        .song-card .info p { font-size: 12px; color: var(--text-muted); }
        .song-card .actions { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
        .song-card .actions button { flex: 1; padding: 8px; border: none; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; }
        .song-card .actions .btn-play { background: var(--gradient-1); color: white; }
        .song-card .actions .btn-play:hover { transform: scale(1.05); }
        .song-card .actions .btn-save { background: var(--input-bg); color: var(--text-secondary); border: 1px solid var(--border-color); }
        .song-card .actions .btn-save:hover { border-color: var(--gradient-1); color: var(--gradient-1); }
        
        /* ===== WHATSAPP BANNER ===== */
        .wa-banner {
            display: block; margin: 15px auto; padding: 14px 20px; max-width: 600px;
            background: linear-gradient(135deg, #25D366, #128C7E);
            border-radius: 16px; text-align: center; color: white;
            text-decoration: none; transition: all 0.3s ease; border: 2px solid transparent;
        }
        .wa-banner:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 10px 40px rgba(37,211,102,0.3); border-color: #fff; }
        .wa-banner i { font-size: 24px; margin-right: 10px; }
        .wa-banner h3 { font-size: 16px; letter-spacing: 1px; }
        .wa-banner p { font-size: 12px; opacity: 0.9; margin-top: 2px; }
        
        /* ===== NOTIFICATION ===== */
        .notification {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            padding: 14px 24px; border-radius: 12px; z-index: 999;
            font-weight: 500; max-width: 90%; text-align: center;
            display: none; box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        .notification.success { background: var(--gradient-1); color: white; }
        .notification.error { background: #dc3545; color: white; }
        .notification.info { background: var(--gradient-3); color: white; }
        .notification.visible { display: block; animation: slideDown 0.4s ease; }
        @keyframes slideDown { from { opacity: 0; transform: translateX(-50%) translateY(-30px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
        
        /* ===== FOOTER ===== */
        .footer { text-align: center; padding: 20px; color: var(--text-muted); font-size: 12px; border-top: 1px solid var(--border-color); margin-top: 20px; }
        .footer .owner { color: var(--gradient-1); font-weight: 600; }
        
        /* ===== RESPONSIVE ===== */
        @media (max-width: 480px) {
            .hero h1 { font-size: 28px; }
            .navbar .brand .logo-text { font-size: 18px; }
            .results-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
            .search-section .search-wrapper input { min-width: 150px; font-size: 14px; }
            .search-section .search-wrapper .btn-search { padding: 12px 20px; font-size: 14px; }
        }
    </style>
</head>
<body>

<!-- ===== NAVBAR ===== -->
<nav class="navbar">
    <div class="brand">
        <span class="logo-text"><i class="fas fa-music"></i>DVARY MUSIC</span>
    </div>
    <div class="right-section">
        <button class="nav-btn" onclick="toggleTheme()"><i class="fas fa-moon"></i></button>
        <span class="nav-btn" style="cursor:default; background:var(--accent-glow); color:var(--gradient-1);">🎵 Free</span>
    </div>
</nav>

<!-- ===== NOTIFICATION ===== -->
<div class="notification" id="notification"></div>

<!-- ===== CONTAINER ===== -->
<div class="container">

    <!-- ===== HERO ===== -->
    <div class="hero">
        <span class="icon">🎵</span>
        <h1>DVARY MUSIC API</h1>
        <p>Tafuta nyimbo • Bure • Hakuna API key inahitajika</p>
    </div>

    <!-- ===== WHATSAPP BANNER ===== -->
    <a href="https://whatsapp.com/channel/0029VbCRC9b5fM5cruU8PF2M" target="_blank" class="wa-banner">
        <i class="fab fa-whatsapp"></i>
        <h3>📱 Jiunge na Channel Yetu ya WhatsApp</h3>
        <p>Pata updates za API, nyimbo mpya, na mambo mengi!</p>
    </a>

    <!-- ===== SEARCH ===== -->
    <div class="search-section">
        <div class="search-wrapper">
            <input type="text" id="searchInput" placeholder="🔍 Tafuta wimbo, msanii, au albamu..." onkeypress="if(event.key==='Enter') searchMusic()">
            <button class="btn-search" onclick="searchMusic()" id="searchBtn">🔍 Tafuta</button>
        </div>
    </div>

    <!-- ===== RESULTS ===== -->
    <div id="resultsContainer">
        <div class="results-grid" id="resultsGrid">
            <!-- Rendered by JavaScript -->
        </div>
    </div>

    <!-- ===== FOOTER ===== -->
    <div class="footer">
        <p>© 2026 <span class="owner">DVARY MUSIC API</span> • Free Music API</p>
        <p style="font-size:10px; margin-top:4px;">🎵 Powered by iTunes API • Hakuna API key inahitajika</p>
    </div>
</div>

<script>
// ============================================
// DVARY MUSIC API - Frontend
// ============================================

// ============================================
// STATE
// ============================================
let currentTheme = 'dark';

// ============================================
// THEME
// ============================================
function toggleTheme() {
    const html = document.documentElement;
    currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-theme', currentTheme);
    localStorage.setItem('dvary-music-theme', currentTheme);
}

const savedTheme = localStorage.getItem('dvary-music-theme') || 'dark';
document.documentElement.setAttribute('data-theme', savedTheme);
currentTheme = savedTheme;

// ============================================
// NOTIFICATION
// ============================================
function showNotification(message, type = 'info') {
    const el = document.getElementById('notification');
    el.textContent = message;
    el.className = 'notification ' + type + ' visible';
    setTimeout(() => {
        el.classList.remove('visible');
    }, 4000);
}

// ============================================
// SEARCH MUSIC - Inatumia Backend API
// ============================================
async function searchMusic() {
    const query = document.getElementById('searchInput').value.trim();
    const grid = document.getElementById('resultsGrid');
    
    if (!query) {
        grid.innerHTML = `
            <div style="text-align:center; padding:40px; color:var(--text-muted); grid-column:1/-1;">
                <i class="fas fa-search" style="font-size:40px; display:block; margin-bottom:10px; opacity:0.3;"></i>
                <p>Tafadhali andika jina la wimbo au msanii</p>
            </div>
        `;
        return;
    }
    
    grid.innerHTML = `
        <div style="text-align:center; padding:40px; grid-column:1/-1;">
            <div style="display:inline-block; width:40px; height:40px; border:4px solid var(--border-color); border-radius:50%; border-top-color:var(--gradient-1); animation:spin 0.8s ease-in-out infinite;"></div>
            <p style="color:var(--text-muted); margin-top:10px;">Inatafuta...</p>
        </div>
    `;
    
    try {
        // Tumia backend API yetu (inatumia iTunes)
        const response = await fetch(`/api/search?q=${encodeURIComponent(query)}&limit=25`);
        const data = await response.json();
        
        if (data.status === 'success' && data.data.length > 0) {
            renderSongs(data.data);
        } else {
            grid.innerHTML = `
                <div style="text-align:center; padding:40px; color:var(--text-muted); grid-column:1/-1;">
                    <i class="fas fa-music" style="font-size:40px; display:block; margin-bottom:10px; opacity:0.3;"></i>
                    <p>Hakuna nyimbo zilizopatikana</p>
                </div>
            `;
        }
    } catch (error) {
        console.error('Search error:', error);
        grid.innerHTML = `
            <div style="text-align:center; padding:40px; color:var(--text-muted); grid-column:1/-1;">
                <i class="fas fa-exclamation-circle" style="font-size:40px; display:block; margin-bottom:10px; opacity:0.3;"></i>
                <p>Hitilafu imetokea. Jaribu tena.</p>
            </div>
        `;
    }
}

// ============================================
// RENDER SONGS
// ============================================
function renderSongs(songs) {
    const grid = document.getElementById('resultsGrid');
    
    grid.innerHTML = songs.map((song, index) => {
        const artwork = song.artwork || '';
        const cover = artwork ? `<img src="${artwork}" alt="${song.title}">` : '🎵';
        
        return `
            <div class="song-card" data-index="${index}">
                <div class="cover">
                    ${cover}
                </div>
                <div class="info">
                    <h3>${song.title || 'Unknown'}</h3>
                    <p>${song.artist || 'Unknown Artist'}</p>
                </div>
                <div class="actions">
                    ${song.preview_url ? `<a href="${song.preview_url}" target="_blank" class="btn-play" style="text-decoration:none; display:flex; align-items:center; justify-content:center;"><i class="fas fa-play"></i> Sikiliza</a>` : ''}
                    <button class="btn-save" onclick="saveSong(${index})"><i class="fas fa-heart"></i></button>
                </div>
            </div>
        `;
    }).join('');
}

// ============================================
// SAVE SONG
// ============================================
function saveSong(index) {
    const song = document.querySelectorAll('.song-card')[index];
    const title = song?.querySelector('h3')?.textContent || 'Unknown';
    showNotification(`✅ "${title}" imehifadhiwa kwenye favorites!`, 'success');
}

// ============================================
// KEYBOARD SHORTCUT
// ============================================
document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && document.activeElement === document.getElementById('searchInput')) {
        searchMusic();
    }
});

console.log('🎵 DVARY MUSIC API - Loaded!');
console.log('🔑 Hakuna API key inahitajika - iTunes API ni bure!');
</script>
</body>
</html>
